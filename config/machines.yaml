status_policy:
  # Workforce assignment is configuration; connectivity is live telemetry.
  # Never infer one from the other.
  workforce_states:
    - employed
    - suspended
    - retired
  runtime_states:
    - online
    - reachable_not_onboarded
    - reachable_worker_stale
    - worker_stale
    - never_seen
    - blocked
    - offline
  active_definition:
    workforce_status: employed
    runtime_state: online
  telemetry:
    heartbeat_expected_seconds: 10
    connectivity_scan_seconds: 30
    worker_stale_after_seconds: 60

machines:
  - id: brain-gaming-pc
    name: Gaming PC AI Server
    role: brain
    workforce_status: employed
    live_status_enabled: true
    responsibilities:

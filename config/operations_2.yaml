device_control_policy:
  trust_boundary: Only devices registered to this Operations Center, owned or explicitly managed by the user, authenticated, encrypted, and connected through approved channels may receive remote operations.
  approval_required_for:
    - destructive filesystem changes
    - credential changes
    - firewall changes
    - service uninstall
    - system reboot outside maintenance windows
    - money movement
    - external email or social sending
  preapproved_operations:
    - open approved applications
    - close approved applications
    - restart approved services
    - launch development environments
    - pull git repositories
    - run automated tests
    - start build pipelines
    - synchronize project files
    - execute approved automation workflows
  telemetry_fields:
    - device_name
    - hostname
    - operating_system
    - cpu
    - gpu
    - ram
    - storage
    - battery
    - current_user
    - network_status
    - tailscale_status
    - current_ai_model
    - installed_models
    - active_projects
    - current_tasks
    - idle_percentage
    - temperature
    - load_average
    - health_score
  notification_categories:
    - new_assignment
    - build_completed
    - test_failed
    - deployment_completed
    - git_commit
    - high_temperature
    - low_disk_space
    - security_alert
    - research_completed
    - daily_summary
  notification_actions:
    - acknowledge
    - snooze
    - open_task
    - request_help
  routing_weights:
    cpu_available: 0.18
    gpu_available: 0.12
    ram_available: 0.16
    workload: 0.2
    capability_match: 0.22
    deadline_pressure: 0.12


mission_control:
  id: ai-operations-center-2
  name: AI Operations Center 2.0
  brain_role: Master orchestrator, decision engine, scheduler, memory, security, KPI, audit, and reporting hub.
  principle: The Brain decides who does the work, when it happens, how results merge, and whether outputs pass approval. It should not write every line itself.

machines:
  brain-gaming-pc:
    title: Brain PC / Mission Control
    responsibilities:
      - Master decision engine
      - Global scheduler
      - Long-term memory
      - Project management
      - AI agent routing
      - Authentication
      - Database management
      - KPI dashboard
      - Security monitoring
      - Performance optimization
      - Cost optimization
      - Learning from previous projects
      - Report generation
      - Email dispatch
      - Audit logging
      - Conflict resolution
      - Version management
      - Goal tracking
      - Resource allocation
  dev-laptop:
    title: Lead Software Engineer
    responsibilities:
      - Read project backlog
      - Pull Git repository
      - Review project context from the knowledge base
      - Continue unfinished work
      - Generate code
      - Refactor
      - Unit testing
      - Integration testing
      - API development
      - Database migrations
      - Documentation
      - Technical reports
      - Dependency updates
      - Security scans
      - Code review
      - Merge requests
      - Build installers
      - Package releases
  research-laptop:
    title: Research and Intelligence Lead
    responsibilities:
      - Market research
      - Patent research
      - Academic papers
      - Competitor analysis
      - AI model benchmarking
      - Grant discovery
      - Real estate analysis
      - Funding opportunities
      - Government programs
      - Industry news
      - Reddit summaries
      - Trend prediction
      - Risk analysis
  business-laptop:
    title: Business Operations Lead
    responsibilities:
      - CRM
      - Customer support drafts
      - Marketing campaigns
      - Sales pipeline
      - Proposal generation
      - Invoice management
      - Accounting summaries
      - Product listings
      - Website content
      - Email campaigns
      - Analytics
      - Business KPIs
      - Social media planning


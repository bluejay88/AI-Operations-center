services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["ai-tools"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  open-webui:
    profiles: ["ai-tools"]
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data

  n8n:
    profiles: ["automation-tools"]
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: aiops
      DB_POSTGRESDB_USER: aiops
      DB_POSTGRESDB_PASSWORD: aiops
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-a-long-random-secret}
    volumes:
      - n8n-data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

  flowise:
    profiles: ["automation-tools"]
    image: flowiseai/flowise:latest
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      FLOWISE_USERNAME: ${FLOWISE_USERNAME:-admin}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD:-change-me}
      APIKEY_PATH: /root/.flowise
      SECRETKEY_PATH: /root/.flowise
      LOG_PATH: /root/.flowise/logs
    volumes:
      - flowise-data:/root/.flowise
    depends_on:
      postgres:
        condition: service_healthy

  ai-ops-api:
    build: .
    env_file:
      - .env
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    profiles: ["worker"]
    build: .
    env_file:
      - .env
    command: ["python", "-m", "ai_ops_center.cli", "worker"]
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
  ollama-data:
  open-webui-data:
  n8n-data:
  flowise-data:

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: aiops
      POSTGRES_PASSWORD: aiops
      POSTGRES_DB: aiops
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aiops -d aiops"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    profiles: ["ai-tools"]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  open-webui:
    profiles: ["ai-tools"]
    image: ghcr.io/open-webui/open-webui:main
    depends_on:
      - ollama
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data

  n8n:
    profiles: ["automation-tools"]
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: aiops
      DB_POSTGRESDB_USER: aiops
      DB_POSTGRESDB_PASSWORD: aiops
      DB_POSTGRESDB_SCHEMA: n8n
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-replace-with-a-long-random-secret}
      BRAIN_API_URL: http://ai-ops-api:8088
    volumes:
      - n8n-data:/home/node/.n8n
      - ./workflows/n8n:/workflows:ro
    depends_on:
      postgres:
        condition: service_healthy
      ai-ops-api:
        condition: service_healthy

  flowise:
    profiles: ["automation-tools"]
    image: flowiseai/flowise:latest
    ports:
      - "3001:3000"
    environment:
      PORT: 3000
      FLOWISE_USERNAME: ${FLOWISE_USERNAME:-admin}
      FLOWISE_PASSWORD: ${FLOWISE_PASSWORD:-change-me}
      APIKEY_PATH: /root/.flowise
      SECRETKEY_PATH: /root/.flowise
      LOG_PATH: /root/.flowise/logs
    volumes:
      - flowise-data:/root/.flowise
    depends_on:
      postgres:
        condition: service_healthy

  ai-ops-api:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PET_KEY_REGISTRY_REQUIRED: ${PET_KEY_REGISTRY_REQUIRED:-false}
      PET_BROWSER_ALLOWED_SCHEMES: ${PET_BROWSER_ALLOWED_SCHEMES:-https}
      PET_BROWSER_ALLOWED_DOMAINS: ${PET_BROWSER_ALLOWED_DOMAINS:-}
    ports:
      - "8088:8088"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; response=httpx.get('http://localhost:8088/health', timeout=5); response.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  ai-ops-llm-router:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      AI_OPS_QUEUE_STEWARD_ENABLED: "false"
    command: ["uvicorn", "ai_ops_center.api:app", "--host", "0.0.0.0", "--port", "8091"]
    ports:
      - "8091:8091"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; response=httpx.get('http://localhost:8091/llm-mesh/status', timeout=5); response.raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      PET_KEY_REGISTRY_REQUIRED: ${PET_KEY_REGISTRY_REQUIRED:-false}
      PET_BROWSER_ALLOWED_SCHEMES: ${PET_BROWSER_ALLOWED_SCHEMES:-https}
      PET_BROWSER_ALLOWED_DOMAINS: ${PET_BROWSER_ALLOWED_DOMAINS:-}
      PET_ENABLE_BROWSER_NAVIGATION: ${PET_ENABLE_BROWSER_NAVIGATION:-false}
      PET_ENABLE_MUSIC_LIBRARY: ${PET_ENABLE_MUSIC_LIBRARY:-false}
      PET_ENABLE_MUSIC_PLAYBACK: ${PET_ENABLE_MUSIC_PLAYBACK:-false}
      PET_ENABLE_DEVICE_MODEL_CHAT: ${PET_ENABLE_DEVICE_MODEL_CHAT:-false}
    command: ["python", "-m", "ai_ops_center.cli", "worker", "--machine", "${WORKER_MACHINE_ID:-brain-gaming-pc}", "--sleep-seconds", "${WORKER_SLEEP_SECONDS:-2}", "--work-seconds", "${WORKER_WORK_SECONDS:-4}"]
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "ai_ops_center.cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  postgres-data:
  ollama-data:
  open-webui-data:
  n8n-data:
  flowise-data:
